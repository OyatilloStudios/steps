name: X-Step Pro APK Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Kodni yuklab olish
      uses: actions/checkout@v4

    - name: 2. ZIP faylni aniqlash va arxivdan ochish
      run: |
        # Repozitoriyadagi ZIP faylni qidirib topamiz
        ZIP_FILE=$(find . -name "*.zip" -type f | head -n 1)
        
        if [ -z "$ZIP_FILE" ]; then
          echo "⚠️ XATOLIK: Repozitoriyada hech qanday .zip fayli topilmadi!"
          echo "Iltimos, arxiv faylingiz .zip kengaytmada ekanligini tekshiring."
          ls -la
          exit 1
        fi
        
        echo "Topilgan arxiv: $ZIP_FILE"
        echo "Arxiv ochilmoqda..."
        unzip -q "$ZIP_FILE" -d .
        echo "ZIP fayl muvaffaqiyatli ochildi."

    - name: 3. Java 21 o'rnatish
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: 4. Xatoliklarni tozalash va muhitni tayyorlash
      run: |
        # ZIP ichidan chiqqan loyiha papkasini avtomat topish
        TARGET_DIR=$(dirname $(find . -name "app" -type d | head -n 1))
        cd $TARGET_DIR
        
        echo "Ishchi papka: $TARGET_DIR"
        
        touch .env .env.example
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        
        if [ -f "app/build.gradle.kts" ]; then
          echo "build.gradle.kts tozalanmoqda..."
          sed -i 's/"ksp"(/add("ksp", /g' app/build.gradle.kts
          sed -i 's/ksp(/add("ksp", /g' app/build.gradle.kts
        fi
        
        # Keystore yaratish
        keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -storepass android -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        echo "Keystore fayli yaratildi."

    - name: 5. Toza Gradle 9.3.1 dvigatelini o'rnatish
      run: |
        TARGET_DIR=$(dirname $(find . -name "app" -type d | head -n 1))
        cd $TARGET_DIR
        
        wget -q https://services.gradle.org/distributions/gradle-9.3.1-bin.zip
        unzip -q gradle-9.3.1-bin.zip

    - name: 6. Dasturni yig'ish (Build APK)
      run: |
        TARGET_DIR=$(dirname $(find . -name "app" -type d | head -n 1))
        cd $TARGET_DIR
        
        ./gradle-9.3.1/bin/gradle assembleDebug -x lint -x test --no-daemon

    - name: 7. Tayyor faylni olish
      uses: actions/upload-artifact@v4
      with:
        name: X-Step-Pro-APK-Fayl
        path: "**/app/build/outputs/apk/debug/*.apk"
